  <!-- 方案B：内联诊断脚本，页面加载后自动测试API连通性 -->
  <script>
    window.__apiDiag = async function() {
      const el = document.getElementById('menu-status');
      const log = (msg) => { console.log('[诊断]', msg); if (el) el.textContent = msg; };
      try {
        log('诊断中：正在请求 /api/chat ...');
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [{ role: 'user', content: '说OK' }],
            temperature: 0.5,
            max_tokens: 10,
          }),
        });
        log('诊断中：HTTP ' + resp.status + '，正在读取body...');
        const data = await resp.json();
        if (data.choices) {
          log('API 连通正常！回复：' + data.choices[0].message.content);
        } else {
          log('API 返回异常：' + JSON.stringify(data).substring(0, 100));
        }
      } catch (e) {
        log('API 请求失败：' + e.message);
        console.error('[诊断] 异常详情:', e);
      }
    };
  </script>
